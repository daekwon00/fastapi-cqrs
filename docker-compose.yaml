services:
  app:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: intranet
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
